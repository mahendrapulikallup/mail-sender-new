<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMTP Email Sender</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1d2671, #c33764);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: #fff;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    h1 {
      text-align: center;
      color: #222;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #333;
      font-weight: 600;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d3d3d3;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: 0.3s;
    }

    input:focus,
    textarea:focus {
      border-color: #6c63ff;
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
    }

    textarea {
      resize: none;
    }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      background: #6c63ff;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #574ee8;
    }

    button:disabled {
      background: #9c98f5;
      cursor: not-allowed;
    }

    #status {
      margin-top: 18px;
      text-align: center;
      font-weight: 600;
      min-height: 20px;
    }

    .success { color: green; }
    .error { color: red; }
    .info { color: #333; }
  </style>
</head>
<body>
  <div class="container">
    <h1>SMTP Email Sender</h1>
    <p class="subtitle">Send email using Flask + Gmail SMTP</p>

    <form id="emailForm">
      <div class="input-group">
        <label for="receiverEmail">Receiver Email</label>
        <input type="email" id="receiverEmail" placeholder="Enter receiver email" required />
      </div>

      <div class="input-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" placeholder="Enter email subject" required />
      </div>

      <div class="input-group">
        <label for="message">Message</label>
        <textarea id="message" rows="6" placeholder="Write your message..." required></textarea>
      </div>

      <button type="submit" id="sendBtn">Send Email</button>
    </form>

    <p id="status"></p>
  </div>

  <script>
    const form = document.getElementById("emailForm");
    const statusText = document.getElementById("status");
    const sendBtn = document.getElementById("sendBtn");

    // IMPORTANT:
    // After Render deploy, replace this with your real Render backend URL
    const BACKEND_URL = "https://YOUR-RENDER-SERVICE.onrender.com/send-email";

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const receiverEmail = document.getElementById("receiverEmail").value.trim();
      const subject = document.getElementById("subject").value.trim();
      const message = document.getElementById("message").value.trim();

      statusText.className = "info";
      statusText.textContent = "Sending email...";
      sendBtn.disabled = true;
      sendBtn.textContent = "Sending...";

      try {
        const response = await fetch(BACKEND_URL, {
          method: "POST",
          mode: "cors",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            receiverEmail,
            subject,
            message
          })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          statusText.className = "success";
          statusText.textContent = data.message || "Email sent successfully!";
          form.reset();
        } else {
          statusText.className = "error";
          statusText.textContent = data.message || "Failed to send email.";
        }
      } catch (error) {
        console.error(error);
        statusText.className = "error";
        statusText.textContent = "Could not connect to backend.";
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = "Send Email";
      }
    });
  </script>
</body>
</html>
